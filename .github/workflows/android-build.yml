name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      - name: Generate config.dart
        run: |
          cat > lib/config.dart << 'DART_CONFIG'
          // Auto-generated by CI — do not edit manually.
          class AppConfig {
            static const String supabaseUrl =
                "https://qmssimnsohijqhbshfjn.supabase.co";
            static const String supabaseAnonKey =
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtc3NpbW5zb2hpanFoYnNoZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTY5ODAsImV4cCI6MjA5NTM5Mjk4MH0.5GZMjqh43EXZcg1VwtJ5Gk0zkQTExMaPTUpxiGgcPf8";
            static const String supabaseServiceRole =
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtc3NpbW5zb2hpanFoYnNoZmpuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTgxNjk4MCwiZXhwIjoyMDk1MzkyOTgwfQ.SOAH8QHs6jn3N4T3TzK0mctMGAxAR49YHEVLhuePMvY";
            static const String githubPat = "";
            static const String githubRepo =
                "https://github.com/haladentalclinic-spec/dental";
            static const String cfAccountId = "";
            static const String cfApiToken = "";
            static const String defaultClinicId =
                "99999999-9999-9999-9999-999999999999";
          }
          DART_CONFIG

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze --no-fatal-infos

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: haladent-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
