<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003c90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F52BA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006B5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4fdbc8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="200" cy="180" r="100" fill="url(#bg)"/>
  <!-- Tooth shape -->
  <path d="M160 140 Q160 100 180 90 Q200 80 200 80 Q200 80 220 90 Q240 100 240 140 
           L240 200 Q240 240 220 250 Q210 255 200 260 Q190 255 180 250 Q160 240 160 200 Z" 
        fill="white"/>
  <!-- Medical cross on tooth -->
  <rect x="192" y="120" width="16" height="48" rx="3" fill="#006B5F"/>
  <rect x="176" y="136" width="48" height="16" rx="3" fill="#006B5F"/>
  <!-- Small cross in top right accent -->
  <circle cx="260" cy="120" r="30" fill="url(#accent)" opacity="0.9"/>
  <rect x="254" y="108" width="12" height="24" rx="2" fill="white"/>
  <rect x="248" y="114" width="24" height="12" rx="2" fill="white"/>
  <!-- Text -->
  <text x="200" y="330" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#003c90" text-anchor="middle" letter-spacing="2">HALA DENTAL</text>
  <text x="200" y="360" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#434653" text-anchor="middle" letter-spacing="4">C L I N I C</text>
</svg>
